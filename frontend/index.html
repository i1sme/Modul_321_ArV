<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chat App</title>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      :root {
        --bg: #1e1e1e;
        --bg2: #252525;
        --bg3: #2d2d2d;
        --border: #3a3a3a;
        --accent: #4a9eff;
        --text: #e0e0e0;
        --text2: #888;
        --green: #4caf50;
      }
      html,
      body {
        height: 100%;
        background: var(--bg);
        color: var(--text);
        font-family: system-ui, sans-serif;
        font-size: 14px;
      }
      #app {
        display: flex;
        height: 100vh;
      }
      #sidebar {
        width: 200px;
        flex-shrink: 0;
        background: var(--bg2);
        border-right: 1px solid var(--border);
        display: flex;
        flex-direction: column;
      }
      .sidebar-title {
        padding: 16px;
        font-size: 16px;
        font-weight: 600;
        border-bottom: 1px solid var(--border);
      }
      .section-label {
        padding: 12px 16px 6px;
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--text2);
      }
      .room-list {
        padding: 4px 8px;
      }
      .room-item {
        padding: 7px 10px;
        border-radius: 4px;
        cursor: pointer;
        color: var(--text2);
        transition:
          background 0.1s,
          color 0.1s;
      }
      .room-item:hover {
        background: var(--bg3);
        color: var(--text);
      }
      .room-item.active {
        background: var(--bg3);
        color: var(--accent);
      }
      .room-item::before {
        content: "# ";
      }
      input,
      textarea,
      button {
        font-family: inherit;
        font-size: 14px;
        border-radius: 4px;
        border: 1px solid var(--border);
        background: var(--bg3);
        color: var(--text);
        outline: none;
      }
      input:focus,
      textarea:focus {
        border-color: var(--accent);
      }
      #user-section {
        margin-top: auto;
        padding: 12px;
        border-top: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      #username-input {
        width: 100%;
        padding: 7px 10px;
      }
      #set-username-btn {
        width: 100%;
        padding: 7px;
        cursor: pointer;
        background: var(--accent);
        border-color: var(--accent);
        color: #fff;
        transition: opacity 0.1s;
      }
      #set-username-btn:hover {
        opacity: 0.85;
      }
      .online-list {
        padding: 4px 8px 8px;
      }
      .online-user {
        display: flex;
        align-items: center;
        gap: 7px;
        padding: 4px 8px;
        font-size: 13px;
        color: var(--text2);
      }
      .dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: var(--green);
        flex-shrink: 0;
      }
      #chat-area {
        flex: 1;
        display: flex;
        flex-direction: column;
        min-width: 0;
      }
      #no-room {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--text2);
      }
      #chat-header {
        padding: 12px 20px;
        border-bottom: 1px solid var(--border);
        background: var(--bg2);
        display: none;
        align-items: center;
        gap: 10px;
      }
      #chat-header .room-name {
        font-weight: 600;
      }
      #chat-header .room-name::before {
        content: "# ";
        color: var(--text2);
        font-weight: 400;
      }
      #conn-status {
        margin-left: auto;
        font-size: 12px;
        color: var(--green);
      }
      #conn-status.off {
        color: #e57373;
      }
      #messages {
        flex: 1;
        overflow-y: auto;
        padding: 16px 20px;
        display: none;
        flex-direction: column;
        gap: 1px;
      }
      #messages::-webkit-scrollbar {
        width: 4px;
      }
      #messages::-webkit-scrollbar-thumb {
        background: var(--border);
        border-radius: 2px;
      }
      .msg {
        display: flex;
        gap: 10px;
        padding: 4px 0;
      }
      .msg-author {
        font-weight: 500;
        color: var(--accent);
        min-width: 100px;
        text-align: right;
        flex-shrink: 0;
      }
      .msg-author.self {
        color: var(--green);
      }
      .msg-time {
        font-size: 11px;
        color: var(--text2);
        display: block;
        margin-top: 2px;
        text-align: right;
      }
      .msg-content {
        color: var(--text);
        line-height: 1.5;
        word-break: break-word;
        padding-top: 1px;
      }
      .sys-msg {
        text-align: center;
        color: var(--text2);
        font-size: 12px;
        padding: 6px 0;
      }
      #input-area {
        padding: 12px 20px;
        border-top: 1px solid var(--border);
        background: var(--bg2);
        display: none;
        gap: 8px;
      }
      #msg-input {
        flex: 1;
        padding: 8px 12px;
        resize: none;
        min-height: 38px;
        max-height: 100px;
        line-height: 1.4;
      }
      #send-btn {
        padding: 8px 16px;
        cursor: pointer;
        background: var(--accent);
        border-color: var(--accent);
        color: #fff;
        align-self: flex-end;
        transition: opacity 0.1s;
      }
      #send-btn:hover {
        opacity: 0.85;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="sidebar">
        <div class="sidebar-title">Chat App by ArV</div>
        <div class="section-label">Rooms</div>
        <div class="room-list">
          <div class="room-item" data-room="general">general</div>
          <div class="room-item" data-room="random">random</div>
          <div class="room-item" data-room="dev">dev</div>
          <div class="room-item" data-room="offtopic">offtopic</div>
        </div>
        <div class="section-label">Online</div>
        <div class="online-list" id="online-list">
          <div class="online-user" style="color: var(--text2); font-size: 12px">
            —
          </div>
        </div>
        <div id="user-section">
          <input
            id="username-input"
            type="text"
            placeholder="Benutzername..."
            maxlength="50"
            autocomplete="off"
          />
          <button id="set-username-btn">Use</button>
        </div>
      </div>
      <div id="chat-area">
        <div id="no-room">Choose the room to start talking</div>
        <div id="chat-header">
          <span class="room-name" id="header-room"></span>
          <span id="conn-status">● Connected</span>
        </div>
        <div id="messages"></div>
        <div id="input-area">
          <textarea id="msg-input" placeholder="Message..."></textarea>
          <button id="send-btn">Send</button>
        </div>
      </div>
    </div>
    <script>
      const BACKEND = location.protocol + "//" + location.hostname + ":3000";
      let username = localStorage.getItem("chat_username") || "";
      let currentRoom = null;
      const socket = io(BACKEND);
      const usernameInput = document.getElementById("username-input");
      const setUsernameBtn = document.getElementById("set-username-btn");
      const roomItems = document.querySelectorAll(".room-item");
      const messagesEl = document.getElementById("messages");
      const msgInput = document.getElementById("msg-input");
      const onlineList = document.getElementById("online-list");
      const noRoom = document.getElementById("no-room");
      const chatHeader = document.getElementById("chat-header");
      const headerRoom = document.getElementById("header-room");
      const inputArea = document.getElementById("input-area");
      const connStatus = document.getElementById("conn-status");
      if (username) usernameInput.value = username;
      setUsernameBtn.addEventListener("click", applyUsername);
      usernameInput.addEventListener("keydown", (e) => {
        if (e.key === "Enter") applyUsername();
      });
      async function applyUsername() {
        const val = usernameInput.value.trim();
        if (!val) return;
        try {
          const res = await fetch(BACKEND + "/users", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ username: val }),
          });
          if (!res.ok) {
            const e = await res.json();
            alert(e.error);
            return;
          }
          username = val;
          localStorage.setItem("chat_username", username);
          if (currentRoom) joinRoom(currentRoom);
        } catch {
          alert("Verbindungsfehler");
        }
      }
      roomItems.forEach((item) =>
        item.addEventListener("click", () => {
          if (!username) {
            usernameInput.focus();
            return;
          }
          joinRoom(item.dataset.room);
        }),
      );
      async function joinRoom(room) {
        currentRoom = room;
        roomItems.forEach((i) =>
          i.classList.toggle("active", i.dataset.room === room),
        );
        noRoom.style.display = "none";
        chatHeader.style.display = "flex";
        messagesEl.style.display = "flex";
        inputArea.style.display = "flex";
        headerRoom.textContent = room;
        messagesEl.innerHTML = "";
        try {
          const res = await fetch(BACKEND + "/rooms/" + room + "/messages");
          const msgs = await res.json();
          msgs.forEach((m) => appendMessage(m));
          scrollBottom();
        } catch {}
        socket.emit("join_room", { username, room });
        msgInput.focus();
      }
      document
        .getElementById("send-btn")
        .addEventListener("click", sendMessage);
      msgInput.addEventListener("keydown", (e) => {
        if (e.key === "Enter" && !e.shiftKey) {
          e.preventDefault();
          sendMessage();
        }
      });
      msgInput.addEventListener("input", () => {
        msgInput.style.height = "auto";
        msgInput.style.height = Math.min(msgInput.scrollHeight, 100) + "px";
      });
      function sendMessage() {
        const content = msgInput.value.trim();
        if (!content || !currentRoom || !username) return;
        socket.emit("send_message", { username, room: currentRoom, content });
        msgInput.value = "";
        msgInput.style.height = "auto";
      }
      socket.on("connect", () => {
        connStatus.textContent = "● connected";
        connStatus.classList.remove("off");
        if (currentRoom && username)
          socket.emit("join_room", { username, room: currentRoom });
      });
      socket.on("disconnect", () => {
        connStatus.textContent = "● disconnected";
        connStatus.classList.add("off");
      });
      socket.on("new_message", (msg) => {
        if (msg.room === currentRoom) {
          appendMessage(msg);
          scrollBottom();
        }
      });
      socket.on("user_joined", ({ username: u, activeUsers }) => {
        if (u !== username) appendSysMsg(u + " has been connected");
        renderOnline(activeUsers);
      });
      socket.on("user_left", ({ username: u, activeUsers }) => {
        appendSysMsg(u + " has left the room");
        renderOnline(activeUsers);
      });
      function appendMessage(msg) {
        const isSelf = msg.username === username;
        const time = new Date(msg.created_at).toLocaleTimeString("de-CH", {
          hour: "2-digit",
          minute: "2-digit",
        });
        const div = document.createElement("div");
        div.className = "msg";
        div.innerHTML =
          '<div class="msg-author ' +
          (isSelf ? "self" : "") +
          '">' +
          esc(msg.username) +
          '<span class="msg-time">' +
          time +
          '</span></div><div class="msg-content">' +
          esc(msg.content) +
          "</div>";
        messagesEl.appendChild(div);
      }
      function appendSysMsg(text) {
        const d = document.createElement("div");
        d.className = "sys-msg";
        d.textContent = text;
        messagesEl.appendChild(d);
        scrollBottom();
      }
      function renderOnline(users) {
        onlineList.innerHTML =
          users.length === 0
            ? '<div class="online-user" style="color:var(--text2);font-size:12px">—</div>'
            : users
                .map(
                  (u) =>
                    '<div class="online-user"><div class="dot"></div>' +
                    esc(u) +
                    "</div>",
                )
                .join("");
      }
      function scrollBottom() {
        messagesEl.scrollTop = messagesEl.scrollHeight;
      }
      function esc(s) {
        return s
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;");
      }
    </script>
  </body>
</html>
